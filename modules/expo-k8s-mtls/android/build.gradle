plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.k8smtls'
version = '0.1.0'

android {
  namespace "expo.modules.k8smtls"
  defaultConfig {
    versionCode 1
    versionName '0.1.0'
  }
}

dependencies {
  implementation "com.squareup.okhttp3:okhttp:4.12.0"
}
